<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overall L3 TT Summary</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    /* DU logo palette */
    --violet:#5F51C0;
    --violet-dk:#4F329E;
    --indigo:#17256C;
    --cyan:#02AAD1;
    --cyan-dk:#1495CC;
    --grad:linear-gradient(120deg,#4F329E 0%,#17256C 42%,#1495CC 100%);
    --grad-soft:linear-gradient(120deg,#5F51C0 0%,#1495CC 100%);
    --text:#1e2238;
    --muted:#6b7185;
    --border:#e3e1f0;
    --row-alt:#f3f1fb;
    --card-bg:#ffffff;
    --ok:#1f9d55; --warn:#e8a33d; --danger:#d6336c;
    --bg:#eef0f7;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);padding:24px;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;}

  /* ===== page header ===== */
  .page-head{
    background:var(--grad);border-radius:16px;padding:20px 28px;color:#fff;
    display:flex;align-items:center;gap:20px;box-shadow:0 10px 28px rgba(23,37,108,.28);
  }
  .page-head img.logo{width:62px;height:62px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.22);}
  .page-head .titles{flex:1;}
  .page-head h1{font-size:26px;font-weight:800;letter-spacing:.3px;}
  .page-head .sub{font-size:13px;opacity:.85;margin-top:3px;}
  .page-head .icons{display:flex;gap:22px;}
  .page-head .person{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;opacity:.95;font-weight:600;}
  .page-head .person svg{width:34px;height:34px;}

  /* ===== toolbar ===== */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:16px 0 6px;}
  .toolbar .status{font-size:13px;color:var(--muted);margin-right:auto;}
  .btn{background:var(--grad-soft);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(79,50,158,.34);}

  /* ===== tabs ===== */
  .tabs{display:flex;gap:6px;margin-top:18px;}
  .tab{
    flex:0 0 auto;padding:13px 34px;font-size:15px;font-weight:700;cursor:pointer;
    color:var(--muted);background:#e0def0;border-radius:12px 12px 0 0;border:1px solid var(--border);border-bottom:none;
    transition:all .15s;letter-spacing:.4px;
  }
  .tab:hover{color:var(--violet-dk);}
  .tab.active{color:#fff;background:var(--grad);box-shadow:0 -2px 10px rgba(23,37,108,.18);}
  .tabpane{display:none;}
  .tabpane.active{display:block;}

  /* ===== section headers ===== */
  .section-head{
    background:var(--grad);color:#fff;font-size:18px;font-weight:700;padding:12px 20px;border-radius:8px 8px 0 0;
    letter-spacing:.3px;margin-top:26px;display:flex;align-items:center;gap:10px;
  }
  .section-head .ic{width:19px;height:19px;opacity:.95;flex:0 0 auto;}
  .zone{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:22px;}

  .block-title{font-size:12.5px;font-weight:800;color:var(--violet-dk);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 13px;padding-bottom:6px;border-bottom:2px solid var(--border);}
  .block-title:first-child{margin-top:0;}

  /* round KPI cards */
  .kpi-grid{display:flex;flex-wrap:wrap;gap:16px;}
  .kpi-card{
    background:#fff;border:5px solid var(--violet);border-radius:50%;
    width:130px;height:130px;flex:0 0 130px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px;
    box-shadow:0 4px 14px rgba(79,50,158,.16);
  }
  .kpi-card.c2{border-color:var(--cyan);}
  .kpi-card .label{font-size:11px;font-weight:700;color:var(--text);line-height:1.18;padding:0 4px;}
  .kpi-card .rule{height:1px;width:40px;background:var(--border);margin:6px 0 8px;}
  .kpi-card .value{font-size:22px;font-weight:800;color:var(--violet-dk);letter-spacing:-.5px;}
  .kpi-card.c2 .value{color:var(--cyan-dk);}
  .kpi-card .value.txt{font-size:11px;font-weight:700;color:var(--muted);font-style:italic;}

  /* metric chips */
  .chips{display:flex;flex-wrap:wrap;gap:12px;}
  .chip{flex:1 1 130px;min-width:130px;background:#f6f5fd;border:1px solid var(--border);border-left:4px solid var(--violet);border-radius:8px;padding:12px 14px;}
  .chip.c2{border-left-color:var(--cyan);}
  .chip .v{font-size:23px;font-weight:800;color:var(--indigo);line-height:1;}
  .chip .l{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:600;}

  /* tables */
  .table-zone{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{background:var(--grad);color:#fff;font-weight:700;padding:11px 10px;text-align:center;border-right:1px solid rgba(255,255,255,.16);font-size:11px;white-space:nowrap;}
  thead th:first-child{text-align:left;padding-left:14px;}
  tbody td{padding:9px 10px;text-align:center;border-bottom:1px solid #eceaf6;color:#33323c;}
  tbody td:first-child{text-align:left;padding-left:14px;font-weight:600;}
  tbody td.desc{text-align:left;font-weight:400;max-width:340px;}
  tbody tr:nth-child(even){background:var(--row-alt);}
  tbody tr.total-row{background:var(--indigo)!important;}
  tbody tr.total-row td{color:#fff;font-weight:700;border-bottom:none;}

  .status-b{display:inline-block;padding:3px 10px;border-radius:11px;font-size:10.5px;font-weight:700;white-space:nowrap;}
  .st-assigned{background:#ece9fb;color:var(--violet-dk);}
  .st-rejected{background:#fce3ec;color:var(--danger);}
  .st-closed{background:#e3f4ea;color:var(--ok);}
  .st-open{background:#e0f5fa;color:var(--cyan-dk);}
  .st-progress{background:#fff4e2;color:#b9791f;}
  .st-completed{background:#e3f4ea;color:var(--ok);}
  .st-failed{background:#fce3ec;color:var(--danger);}

  .rel-banner{display:flex;align-items:center;gap:12px;background:#f6f5fd;border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;}
  .rel-banner .tag{background:var(--cyan);color:#fff;font-weight:700;font-size:12px;padding:4px 12px;border-radius:6px;}
  .rel-banner .rel-val{font-weight:800;color:var(--indigo);font-size:15px;}

  /* overall summary callouts */
  .callouts{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:860px){.callouts{grid-template-columns:1fr;}}
  .callout{border-radius:10px;padding:16px 18px;border:1px solid var(--border);}
  .callout.high{background:linear-gradient(135deg,#f1eefb,#e7f6fa);border-left:5px solid var(--violet);}
  .callout.chal{background:#fffaf2;border-left:5px solid var(--warn);}
  .callout h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;color:var(--indigo);}
  .callout ul{margin:0;padding-left:18px;}
  .callout li{font-size:13.5px;margin:6px 0;color:#3a3a48;line-height:1.4;}

  /* editable */
  td[contenteditable]{outline:none;cursor:text;}
  td[contenteditable]:hover{background:#fbf7ff;box-shadow:inset 0 0 0 1px var(--violet);}
  td[contenteditable]:focus{background:#fff;box-shadow:inset 0 0 0 2px var(--cyan);border-radius:3px;}
  .row-del{cursor:pointer;color:var(--danger);font-weight:800;border:none;background:none;font-size:15px;line-height:1;padding:2px 6px;border-radius:5px;}
  .row-del:hover{background:#fce3ec;}
  .tbl-foot{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:#f6f5fd;border-top:1px solid var(--border);}
  .add-row{background:var(--grad-soft);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .add-row:hover{filter:brightness(1.08);}
  .btn-ghost{background:#fff;color:var(--violet-dk);border:1px solid var(--violet);}
  .btn-ghost:hover{background:#f3f1fb;box-shadow:none;transform:none;}
  .edit-list{margin:0;padding-left:18px;}
  .edit-list li{outline:none;}
  .edit-list li[contenteditable]:hover{background:#fbf7ff;}
  .save-dot{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ok);font-weight:600;}
  .save-dot::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--ok);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--indigo);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;pointer-events:none;z-index:99;}
  .toast.show{opacity:1;}
  .aging-pill{display:inline-block;min-width:26px;padding:2px 8px;border-radius:10px;font-weight:700;font-size:11.5px;}
  .age-low{background:#e3f4ea;color:var(--ok);}
  .age-mid{background:#fff4e2;color:#b9791f;}
  .age-high{background:#fce3ec;color:var(--danger);}
</style>
</head>
<body>
<div class="wrap">

  <div class="page-head">
    <img class="logo" id="logo" alt="du">
    <div class="titles">
      <h1>Overall L3 TT Summary</h1>
      <div class="sub">Daily Status Report — Test &amp; Engineering Tracking</div>
    </div>
  </div>

  <div class="toolbar">
    <span class="status" id="status">Showing sample data — load your Excel to update</span>
    <span class="save-dot" id="savedot" style="display:none">Auto-saved</span>
    <button class="btn btn-ghost" onclick="resetData()">Reset to Original</button>
    <button class="btn" onclick="document.getElementById('file').click()">Load Excel</button>
    <input type="file" id="file" accept=".xlsx,.xls" style="display:none">
  </div>

  <div id="overall"></div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="bau" onclick="switchTab('bau')">BAU</div>
    <div class="tab" data-tab="ignite" onclick="switchTab('ignite')">IGNITE</div>
  </div>

  <div class="tabpane active" id="pane-bau"></div>
  <div class="tabpane" id="pane-ignite"></div>

</div>
<div class="toast" id="toast"></div>

  if(typeof v==="number" && v>30000 && v<60000){
    const d=new Date(Math.round((v-25569)*86400*1000));
    return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  }
  return String(v);
};

function statusBadge(s){
  const k=String(s).toLowerCase(); let cls="st-open";
  if(k.includes("assign"))cls="st-assigned";
  else if(k.includes("reject"))cls="st-rejected";
  else if(k.includes("fail"))cls="st-failed";
  else if(k.includes("progress"))cls="st-progress";
  else if(k.includes("complet"))cls="st-completed";
  else if(k.includes("clos"))cls="st-closed";
  else if(k.includes("open"))cls="st-open";
  return `<span class="status-b ${cls}">${esc(s)}</span>`;
}
function agingPill(v){
  const n=num(v); let cls="age-low"; if(n>=5)cls="age-high"; else if(n>=3)cls="age-mid";
  return `<span class="aging-pill ${cls}">${esc(v)}</span>`;
}

/* parse [label,value] list into sub-blocks (heading = row with empty value) */
function parseSummary(rows){
  const blocks=[]; let cur={title:null,items:[]};
  rows.forEach(([label,val])=>{
    const heading=(val==null||val==="") && label && !isNumish(label);
    if(heading){ if(cur.items.length||cur.title) blocks.push(cur); cur={title:label,items:[]}; }
    else cur.items.push([label,val]);
  });
  if(cur.items.length||cur.title) blocks.push(cur);
  return blocks;
}
function summaryHTML(blocks,c2,path){
  let h=""; const cc=c2?" c2":""; let idx=0;
  blocks.forEach((b,bi)=>{
    if(b.title){ const ti=idx; idx++; h+=`<div class="block-title">${esc(b.title)}</div>`; }
    if(bi===0 && !b.title){
      h+=`<div class="kpi-grid">`+b.items.map(it=>{
        const myi=idx++; const txt=!isNumish(it[1]) && it[1]!=null && it[1]!=="";
        const e=path?` contenteditable="true" data-pair="${path}" data-i="${myi}" onblur="editPair(this)"`:"";
        return `<div class="kpi-card${cc}"><div class="label">${esc(it[0])}</div><div class="rule"></div><div class="value${txt?' txt':''}"${e}>${esc(it[1]===""||it[1]==null?"—":it[1])}</div></div>`;
      }).join("")+`</div>`;
    }else{
      h+=`<div class="chips">`+b.items.map(it=>{
        const myi=idx++;
        const e=path?` contenteditable="true" data-pair="${path}" data-i="${myi}" onblur="editPair(this)"`:"";
        return `<div class="chip${cc}"><div class="v"${e}>${esc(it[1]===""||it[1]==null?"—":it[1])}</div><div class="l">${esc(it[0])}</div></div>`;
      }).join("")+`</div>`;
    }
  });
  return h;
}

const IC={
  chart:'<path d="M3 13h4l2 5 4-12 2 7h6"/>',
  grid:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 4v16"/>',
  list:'<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
  refresh:'<path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/>',
  bug:'<path d="M8 6h8M9 6V4h6v2M6 9h12l-1 11H7L6 9z"/>',
  ops:'<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z"/>'
};
const sh=(icon,title)=>`<div class="section-head"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${IC[icon]}</svg>${esc(title)}</div>`;

/* generic table builder. opts: {dateCols:[], statusCols:[], agingCols:[], descCols:[], numbered, totalRow} */
/* path = location of this table's rows array inside DATA, e.g. "BAU_SIT.rows" */
function tableHTML(head,rows,opts={},path){
  const o={dateCols:[],statusCols:[],agingCols:[],descCols:[],numbered:false,totalRow:false,...opts};
  let h=`<div class="table-zone"><table><thead><tr>`;
  if(o.numbered) h+=`<th>#</th>`;
  h+=head.map(x=>`<th>${esc(x)}</th>`).join("")+`</tr></thead><tbody>`;
  h+=rows.map((r,ri)=>{
    let tds=""; if(o.numbered) tds+=`<td>${ri+1}</td>`;
    tds+=r.map((c,ci)=>{
      const editAttr = path ? ` contenteditable="true" data-path="${path}" data-r="${ri}" data-c="${ci}" onblur="editCell(this)"` : "";
      if(o.statusCols.includes(ci)) return `<td${editAttr}>${esc(c)}</td>`;
      if(o.agingCols.includes(ci)) return `<td${editAttr}>${esc(c)}</td>`;
      if(o.dateCols.includes(ci)) return `<td${editAttr}>${esc(fmtDate(c))}</td>`;
      if(o.descCols.includes(ci)) return `<td class="desc"${editAttr}>${esc(c)}</td>`;
      return `<td${editAttr}>${esc(c)}</td>`;
    }).join("");
    if(path && !o.totalRow) tds+=`<td><button class="row-del" title="Delete row" onclick="delRow('${path}',${ri})">✕</button></td>`;
    return `<tr>${tds}</tr>`;
  }).join("");
  if(o.totalRow){
    const tot=["Total"]; for(let c=1;c<head.length;c++) tot.push(o.totalRow.includes(c)?"—":rows.reduce((s,r)=>s+num(r[c]),0));
    h+=`<tr class="total-row">${(o.numbered?`<td></td>`:"")+tot.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`;
  }
  h+=`</tbody></table></div>`;
  if(path && !o.totalRow){
    h+=`<div class="tbl-foot"><button class="add-row" onclick="addRow('${path}',${head.length})">+ Add Row</button><span style="font-size:11.5px;color:var(--muted)">Click any cell to edit</span></div>`;
  }
  return h;
}

function regressionHTML(rg,path){
  let h=`<div class="zone">`;
  const relEdit = path ? ` contenteditable="true" onblur="editScalar('${path}.release',this)"` : "";
  h+=`<div class="rel-banner"><span class="tag">Current Release</span><span class="rel-val"${relEdit}>${esc(rg.release||"—")}</span></div>`;
  h+=`<div class="table-zone" style="border-top:1px solid var(--border);border-radius:8px">`;
  h+=`<table><thead><tr>${rg.head.map(x=>`<th>${esc(x)}</th>`).join("")}</tr></thead><tbody>`;
  h+=`<tr>${rg.row.map((c,ci)=>{
    const e = path ? ` contenteditable="true" data-path="${path}.row" data-r="0" data-c="${ci}" onblur="editCell(this)"` : "";
    return `<td${e}>${esc(c)}</td>`;
  }).join("")}</tr></tbody></table></div></div>`;
  return h;
}

/* ================= render a tab ================= */
function renderBAU(d){
  let h="";
  h+=sh('chart','BAU Test Summary')+`<div class="zone">${summaryHTML(parseSummary(d.BAU),false,"BAU")}</div>`;
  if(d.BAU_Daily) h+=sh('grid','Daily Status')+tableHTML(d.BAU_Daily.head,d.BAU_Daily.rows,{totalRow:[]},"BAU_Daily.rows");
  if(d.BAU_SIT) h+=sh('list','SIT Tracker')+tableHTML(d.BAU_SIT.head,d.BAU_SIT.rows,{statusCols:[5],dateCols:[6,7],descCols:[3]},"BAU_SIT.rows");
  if(d.BAU_Ops) h+=sh('ops','Operations Sign-off')+tableHTML(d.BAU_Ops.head,d.BAU_Ops.rows,{dateCols:[5],agingCols:[6],descCols:[3]},"BAU_Ops.rows");
  if(d.BAU_Reg) h+=sh('refresh','Regression Summary')+regressionHTML(d.BAU_Reg,"BAU_Reg");
  if(d.BAU_Def) h+=sh('bug','Defects Summary')+tableHTML(d.BAU_Def.head,d.BAU_Def.rows,{numbered:true,statusCols:[2],dateCols:[4],descCols:[1]},"BAU_Def.rows");
  document.getElementById("pane-bau").innerHTML=h;
}
function renderIGNITE(d){
  let h="";
  h+=sh('chart','IGNITE Test Summary')+`<div class="zone">${summaryHTML(parseSummary(d.IGNITE),true,"IGNITE")}</div>`;
  if(d.IG_SIT) h+=sh('list','SIT Tracker')+tableHTML(d.IG_SIT.head,d.IG_SIT.rows,{statusCols:[5],dateCols:[6,7],descCols:[3]},"IG_SIT.rows");
  if(d.IG_Reg) h+=sh('refresh','Regression Summary')+regressionHTML(d.IG_Reg,"IG_Reg");
  if(d.IG_Def) h+=sh('bug','Defects Summary')+tableHTML(d.IG_Def.head,d.IG_Def.rows,{numbered:true,statusCols:[2],dateCols:[4],descCols:[1]},"IG_Def.rows");
  document.getElementById("pane-ignite").innerHTML=h;
}
function renderOverall(d){
  const hl=(d.Overall&&d.Overall.highlights)||[], ch=(d.Overall&&d.Overall.challenges)||[];
  let h=sh('grid','Overall Summary')+`<div class="zone"><div class="callouts">`;
  h+=`<div class="callout high"><h3>Highlights of the day</h3><ul class="edit-list">${
    (hl.length?hl:[""]).map((x,i)=>`<li contenteditable="true" data-list="Overall.highlights" data-i="${i}" onblur="editList(this)">${esc(x)||"—"}</li>`).join("")
  }</ul><button class="add-row" style="margin-top:8px" onclick="addList('Overall.highlights')">+ Add</button></div>`;
  h+=`<div class="callout chal"><h3>Challenges</h3><ul class="edit-list">${
    (ch.length?ch:[""]).map((x,i)=>`<li contenteditable="true" data-list="Overall.challenges" data-i="${i}" onblur="editList(this)">${esc(x)||"—"}</li>`).join("")
  }</ul><button class="add-row" style="margin-top:8px" onclick="addList('Overall.challenges')">+ Add</button></div>`;
  h+=`</div></div>`;
  document.getElementById("overall").innerHTML=h;
}
function renderAll(d){ renderOverall(d); renderBAU(d); renderIGNITE(d); }

/* ================= Excel parsing ================= */
function rowsOf(wb,name){ const ws=wb.Sheets[name]; if(!ws) return null; return XLSX.utils.sheet_to_json(ws,{header:1,blankrows:true,raw:true}); }
function trimRow(r){ r=(r||[]).slice(); while(r.length && (r[r.length-1]==null||r[r.length-1]==="")) r.pop(); return r; }
function pairList(rows){
  return rows.slice(1).map(r=>[r[0]??"",r[1]??""])
    .filter(r=>!(String(r[0]).trim()===""&&String(r[1]).trim()===""))
    .map(r=>[r[0],r[1]===""?null:r[1]]);
}
/* a standard table sheet: header in row 1, data after; trim empty cols/rows */
function tableSheet(rows){
  if(!rows||!rows.length) return null;
  const head=trimRow(rows[0]); const w=head.length;
  const data=rows.slice(1).filter(r=>r && r.some(c=>c!=null&&String(c).trim()!=="")).map(r=>{const x=r.slice(0,w); while(x.length<w)x.push(""); return x.map(c=>c??"");});
  return {head,rows:data};
}
function regSheet(rows){
  if(!rows) return null;
  const release=(rows.find(r=>r&&String(r[0]).toLowerCase().includes("current release"))||[])[1]||"";
  const hi=rows.findIndex(r=>r&&r.some(c=>String(c).toLowerCase()==="planned"));
  let head=[],row=[];
  if(hi>=0){ head=trimRow(rows[hi]); row=(rows[hi+1]||[]).slice(0,head.length).map(c=>c??""); }
  return {release,head,row};
}
function overallSheet(rows){
  if(!rows) return {highlights:[],challenges:[]};
  const flat=rows.map(r=>(r&&r[0]!=null)?String(r[0]).trim():"");
  let mode=null,hi=[],ch=[];
  flat.forEach(t=>{
    if(!t) return;
    const lt=t.toLowerCase();
    if(lt.startsWith("highlight")){mode="h";return;}
    if(lt.startsWith("challenge")){mode="c";return;}
    if(mode==="h")hi.push(t); else if(mode==="c")ch.push(t);
  });
  return {highlights:hi,challenges:ch};
}

function parseWorkbook(wb){
  const d=JSON.parse(JSON.stringify(SAMPLE));
  try{
    let r;
    if((r=rowsOf(wb,"Overall Summary"))) d.Overall=overallSheet(r);
    if((r=rowsOf(wb,"BAU"))) d.BAU=pairList(r);
    if((r=rowsOf(wb,"BAU_Daily Status"))) d.BAU_Daily=tableSheet(r);
    if((r=rowsOf(wb,"BAU_SIT"))) d.BAU_SIT=tableSheet(r);
    if((r=rowsOf(wb,"BAU_Operations"))) d.BAU_Ops=tableSheet(r);
    if((r=rowsOf(wb,"BAU_Regression"))) d.BAU_Reg=regSheet(r);
    if((r=rowsOf(wb,"BAU_Defects"))) d.BAU_Def=tableSheet(r);
    if((r=rowsOf(wb,"IGNITE"))) d.IGNITE=pairList(r);
    if((r=rowsOf(wb,"Ignite_SIT"))) d.IG_SIT=tableSheet(r);
    if((r=rowsOf(wb,"Ignite_Regression"))) d.IG_Reg=regSheet(r);
    if((r=rowsOf(wb,"Ignite_Defects"))) d.IG_Def=tableSheet(r);
  }catch(e){ console.error(e); }
  return d;
}

document.getElementById("file").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array",cellDates:true});
      DATA=parseWorkbook(wb);
      // convert dates to display strings so editing is clean
      normalizeDates(DATA);
      save();
      renderAll(DATA);
      document.getElementById("status").textContent="Loaded: "+f.name;
      flashSaved();
    }catch(err){ document.getElementById("status").textContent="Error reading file — check the format"; console.error(err); }
  };
  rd.readAsArrayBuffer(f);
});

/* ================= DATA STORE + PERSISTENCE ================= */
const LS_KEY="l3tt_dashboard_data_v1";
let DATA;

function normalizeDates(d){
  // turn Date objects / excel serials in known date columns into dd Mon yyyy strings
  const map=[["BAU_SIT",[6,7]],["IG_SIT",[6,7]],["BAU_Ops",[5]],["BAU_Def",[4]],["IG_Def",[4]]];
  map.forEach(([k,cols])=>{ if(d[k]&&d[k].rows) d[k].rows.forEach(r=>cols.forEach(c=>{ if(r[c]!=null&&r[c]!=="") r[c]=fmtDate(r[c]); })); });
}

function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); flashSaved(); }
  catch(e){ /* storage unavailable (e.g. sandbox) — edits still live in memory */ }
}
function load(){
  try{ const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; }
  catch(e){ return null; }
}
function flashSaved(){
  const el=document.getElementById("savedot"); if(!el) return;
  el.style.display="inline-flex"; el.textContent="Auto-saved";
  clearTimeout(flashSaved._t);
  flashSaved._t=setTimeout(()=>{ el.style.display="none"; },1600);
}
function toast(msg){
  const t=document.getElementById("toast"); if(!t) return;
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),1800);
}

/* resolve "BAU_SIT.rows" -> nested object */
function resolve(path){ return path.split(".").reduce((o,k)=>o&&o[k],DATA); }
function resolveParent(path){ const ks=path.split("."); const last=ks.pop(); return [ks.reduce((o,k)=>o&&o[k],DATA),last]; }

/* coerce a string to number when the original column is numeric */
function coerce(val,prev){
  if(typeof prev==="number"){ const n=parseFloat(String(val).replace(/[^0-9.\-]/g,"")); return isNaN(n)?val:n; }
  return val;
}

/* ---- edit handlers ---- */
function editCell(el){
  const rows=resolve(el.dataset.path); if(!rows) return;
  const r=+el.dataset.r, c=+el.dataset.c;
  const val=el.textContent.trim();
  rows[r][c]=coerce(val,rows[r][c]);
  save();
}
function editScalar(path,el){
  const [parent,key]=resolveParent(path); if(!parent) return;
  parent[key]=el.textContent.trim(); save();
}
function editList(el){
  const arr=resolve(el.dataset.list); if(!arr) return;
  const i=+el.dataset.i; const v=el.textContent.trim();
  arr[i]=(v==="—")?"":v; save();
}
function addList(path){
  const arr=resolve(path); if(!arr) return; arr.push("New item"); save(); renderAll(DATA); toast("Item added");
}
/* summary cards: map visual index -> pairList index (pairList includes heading rows w/ null value) */
function editPair(el){
  const arr=resolve(el.dataset.pair); if(!arr) return;
  const visI=+el.dataset.i;
  // walk pairList counting only value-bearing items (non-heading)
  let count=-1, target=-1;
  for(let k=0;k<arr.length;k++){
    const isHeading=(arr[k][1]==null||arr[k][1]==="") && arr[k][0] && !isNumish(arr[k][0]);
    if(isHeading) continue;
    count++; if(count===visI){ target=k; break; }
  }
  if(target<0) return;
  let v=el.textContent.trim(); if(v==="—") v="";
  arr[target][1]=coerce(v,arr[target][1]);
  save();
}
function addRow(path,ncols){
  const rows=resolve(path); if(!rows) return;
  rows.push(new Array(ncols).fill(""));
  save(); renderAll(DATA); toast("Row added");
}
function delRow(path,ri){
  const rows=resolve(path); if(!rows) return;
  rows.splice(ri,1); save(); renderAll(DATA); toast("Row deleted");
}
function resetData(){
  if(!confirm("Reset all data back to the original? Your edits will be cleared.")) return;
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  DATA=JSON.parse(JSON.stringify(SAMPLE)); normalizeDates(DATA);
  renderAll(DATA); document.getElementById("status").textContent="Reset to original data";
  toast("Reset to original");
}

/* ================= INIT ================= */
(function init(){
  const saved=load();
  if(saved){ DATA=saved; document.getElementById("status").textContent="Restored your saved data"; flashSaved(); }
  else { DATA=JSON.parse(JSON.stringify(SAMPLE)); normalizeDates(DATA); }
  renderAll(DATA);
})();

</script>
